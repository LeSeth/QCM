<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM Terminale — SVT · Maths · Physique · Culture BF</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #1a6b3a;
            --green-light: #e6f4ec;
            --green-mid: #2e9e59;
            --gold: #e6a817;
            --gold-light: #fdf3d6;
            --red: #c0392b;
            --red-light: #fdecea;
            --bg: #f0f4f0;
            --card: #ffffff;
            --text: #17231e;
            --muted: #5a7060;
            --border: #d1e0d5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background: var(--green);
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,.25);
        }
        .flag {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: linear-gradient(to right, #ef2b2d 33%, #ffffff 33% 66%, #009a44 66%);
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,.3);
        }
        header h1 {
            font-family: 'Syne', sans-serif;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.2;
        }
        header h1 span { color: var(--gold); }
        .timer-badge {
            margin-left: auto;
            background: rgba(255,255,255,.15);
            color: white;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            padding: .4rem .9rem;
            border-radius: 30px;
            font-size: .9rem;
            border: 1px solid rgba(255,255,255,.2);
            white-space: nowrap;
        }
        .timer-badge.urgent { background: rgba(192,57,43,.5); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

        /* CONTAINER */
        .wrap { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

        /* CATEGORY TAGS */
        .cat-tags {
            display: flex; gap: .5rem; flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .cat-tag {
            font-size: .72rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
            padding: .25rem .7rem; border-radius: 20px; cursor: pointer;
            transition: all .2s;
        }
        .cat-tag.all   { background: var(--green); color: white; }
        .cat-tag.svt   { background: #1a6b3a22; color: #1a6b3a; border: 1.5px solid #1a6b3a55; }
        .cat-tag.maths { background: #1565c022; color: #1565c0; border: 1.5px solid #1565c055; }
        .cat-tag.pc    { background: #6a1b9a22; color: #6a1b9a; border: 1.5px solid #6a1b9a55; }
        .cat-tag.cg    { background: #e6710022; color: #b35000; border: 1.5px solid #e6710055; }
        .cat-tag.active.svt   { background: #1a6b3a; color: white; }
        .cat-tag.active.maths { background: #1565c0; color: white; }
        .cat-tag.active.pc    { background: #6a1b9a; color: white; }
        .cat-tag.active.cg    { background: #e67100; color: white; }

        /* PROGRESS */
        .progress-bar-wrap {
            background: var(--border); border-radius: 10px; height: 6px;
            margin-bottom: 1rem; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: var(--green-mid);
            border-radius: 10px; transition: width .4s ease;
        }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: .8rem; color: var(--muted); margin-bottom: 1.2rem;
        }
        .progress-info strong { color: var(--text); }

        /* QUESTION CARD */
        .quiz-card {
            background: var(--card);
            border-radius: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,.09);
            overflow: hidden;
        }
        .card-top {
            padding: 1.2rem 1.5rem .8rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: .8rem;
        }
        .q-number {
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.5rem;
            color: var(--green); line-height: 1;
        }
        .q-sep { color: var(--border); font-size: 1.5rem; }
        .q-total { color: var(--muted); font-size: .85rem; }
        .q-cat {
            margin-left: auto;
            font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
            padding: .2rem .7rem; border-radius: 20px;
        }
        .q-cat.svt   { background: #e6f4ec; color: #1a6b3a; }
        .q-cat.maths { background: #e3f0fd; color: #1565c0; }
        .q-cat.pc    { background: #f3e5f9; color: #6a1b9a; }
        .q-cat.cg    { background: #fff3e0; color: #b35000; }

        .card-body { padding: 1.5rem; }
        .question-text {
            font-family: 'Syne', sans-serif;
            font-size: 1.05rem; font-weight: 600;
            line-height: 1.5; margin-bottom: 1.3rem;
            color: var(--text);
        }

        /* ANSWERS */
        .answers-list { display: flex; flex-direction: column; gap: .65rem; }
        .answer-btn {
            display: flex; align-items: center; gap: .9rem;
            background: #f7faf8; border: 2px solid var(--border);
            border-radius: 1rem; padding: .75rem 1rem;
            cursor: pointer; transition: all .2s; text-align: left;
            font-family: 'DM Sans', sans-serif; font-size: .95rem;
            color: var(--text);
        }
        .answer-btn:hover { background: var(--green-light); border-color: var(--green-mid); transform: translateX(4px); }
        .answer-btn.selected { background: var(--green-light); border-color: var(--green); }
        .answer-btn.correct  { background: #d4edda; border-color: #28a745; }
        .answer-btn.wrong    { background: var(--red-light); border-color: var(--red); }
        .answer-btn.reveal-correct { background: #d4edda; border-color: #28a745; }

        .letter {
            width: 28px; height: 28px; flex-shrink: 0;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: .8rem;
            background: var(--border); color: var(--text);
        }
        .answer-btn.selected .letter { background: var(--green); color: white; }
        .answer-btn.correct  .letter { background: #28a745; color: white; }
        .answer-btn.wrong    .letter { background: var(--red); color: white; }
        .answer-btn.reveal-correct .letter { background: #28a745; color: white; }

        /* FEEDBACK */
        .feedback {
            margin-top: 1rem; padding: .8rem 1rem;
            border-radius: .8rem; font-size: .9rem; font-weight: 500;
            display: none;
        }
        .feedback.correct { background: #d4edda; color: #155724; display: block; }
        .feedback.wrong   { background: var(--red-light); color: #7b1a1a; display: block; }

        /* NAV */
        .card-nav {
            padding: 1rem 1.5rem 1.5rem;
            display: flex; justify-content: space-between; gap: 1rem;
        }
        .btn {
            padding: .6rem 1.4rem; border-radius: 50px;
            font-family: 'Syne', sans-serif; font-weight: 700;
            font-size: .85rem; cursor: pointer; border: none;
            transition: all .2s;
        }
        .btn-prev { background: var(--border); color: var(--text); }
        .btn-prev:hover { background: #c0d5c5; }
        .btn-next { background: var(--green); color: white; }
        .btn-next:hover { background: #145530; }
        .btn-submit { background: var(--gold); color: #1a1200; font-size: .95rem; padding: .7rem 2rem; }
        .btn-submit:hover { background: #c98e10; }
        .btn-restart { background: var(--green); color: white; margin-top: .8rem; }

        /* RESULT */
        .result-screen {
            display: none; padding: 2rem 1.5rem;
            text-align: center;
        }
        .result-screen.show { display: block; }
        .score-circle {
            width: 110px; height: 110px; border-radius: 50%;
            background: var(--green); color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 25px rgba(26,107,58,.3);
        }
        .score-circle .num {
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; line-height: 1;
        }
        .score-circle .denom { font-size: .75rem; opacity: .8; }
        .result-msg { font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--text); }

        /* CORRIGÉ */
        .corrige { text-align: left; margin-top: 1rem; }
        .corrige-item {
            padding: .7rem 0; border-bottom: 1px solid var(--border);
            font-size: .82rem;
        }
        .corrige-item .qtext { font-weight: 600; margin-bottom: .25rem; }
        .corrige-item .ans-line { margin-top: .15rem; }
        .ok { color: #1a6b3a; } .ko { color: var(--red); }

        /* STATS PAR MATIERE */
        .stats-row { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.2rem; }
        .stat-pill {
            padding: .35rem .9rem; border-radius: 20px;
            font-size: .78rem; font-weight: 600;
        }

        footer { text-align: center; margin-top: 2rem; font-size: .75rem; color: var(--muted); }

        @media(max-width:500px){
            .question-text { font-size: .95rem; }
            .btn { font-size: .8rem; padding: .55rem 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="flag"></div>
    <h1>QCM Terminale<br><span>SVT · Maths · Physique · Culture BF</span></h1>
    <div class="timer-badge" id="timerEl">⏱ 60:00</div>
</header>

<div class="wrap">

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:2%"></div>
    </div>
    <div class="progress-info">
        <span><strong id="answeredCount">0</strong> répondues</span>
        <span><strong id="remainingCount">50</strong> restantes</span>
    </div>

    <!-- QUIZ -->
    <div class="quiz-card" id="quizCard">
        <div class="card-top">
            <span class="q-number" id="qNum">1</span>
            <span class="q-sep">/</span>
            <span class="q-total" id="qTot">50</span>
            <span class="q-cat" id="qCatLabel" style="display:none">SVT</span>
        </div>
        <div class="card-body">
            <div class="question-text" id="questionText"></div>
            <div class="answers-list" id="answersContainer"></div>
            <div class="feedback" id="feedbackBox"></div>
        </div>
        <div class="card-nav">
            <button class="btn btn-prev" id="prevBtn">◀ Précédent</button>
            <button class="btn btn-next" id="nextBtn">Suivant ▶</button>
        </div>
        <div style="padding:0 1.5rem 1.5rem; text-align:center;">
            <button class="btn btn-submit" id="submitBtn">📊 Voir mon score</button>
        </div>
    </div>

    <!-- RÉSULTAT -->
    <div class="quiz-card result-screen" id="resultScreen">
        <div class="score-circle">
            <div class="num" id="scoreNum">0</div>
            <div class="denom" id="scoreDenom">/ 50</div>
        </div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="stats-row" id="statsRow"></div>
        <button class="btn btn-submit" id="toggleCorrigeBtn">📖 Afficher le corrigé</button>
        <div class="corrige" id="corrigeDiv" style="display:none"></div>
        <br>
        <button class="btn btn-restart" id="restartBtn">🔄 Recommencer</button>
    </div>

</div>

<footer>© 2026 — 50 QCM Terminale BF | SVT · Maths · Physique-Chimie · Culture générale</footer>

<script>
const QUESTIONS = [
  // ── SVT ──────────────────────────────────────────────────────
  {cat:"svt", q:"Quelle molécule transporte l'information génétique du noyau vers le ribosome ?", a:["ADN","ARN messager","ARN de transfert","Protéine"], c:1},
  {cat:"svt", q:"La mitose produit :", a:["2 cellules haploïdes","2 cellules diploïdes identiques","4 cellules haploïdes","4 cellules diploïdes"], c:1},
  {cat:"svt", q:"L'hormone responsable de l'ovulation est :", a:["FSH","Progestérone","LH","Œstrogène"], c:2},
  {cat:"svt", q:"Quelle structure assure la double circulation chez les mammifères ?", a:["Un cœur à 2 cavités","Un cœur à 3 cavités","Un cœur à 4 cavités","Des branchies"], c:2},
  {cat:"svt", q:"Le siège de la photosynthèse dans la cellule végétale est :", a:["La mitochondrie","Le noyau","Le chloroplaste","Le vacuole"], c:2},
  {cat:"svt", q:"Un individu de groupe sanguin AB :", a:["Est donneur universel","Est receveur universel","A uniquement l'antigène A","N'a aucun anticorps ABO"], c:3},
  {cat:"svt", q:"La méiose se déroule dans :", a:["Le foie","Les organes reproducteurs","Le pancréas","Les reins"], c:1},
  {cat:"svt", q:"L'unité fonctionnelle du rein est :", a:["Le glomérule","L'alvéole","Le néphron","Le tubule"], c:2},
  {cat:"svt", q:"Quel gaz est produit lors de la fermentation alcoolique ?", a:["O₂","CO₂","N₂","H₂"], c:1},
  {cat:"svt", q:"L'ADN est composé de :", a:["Acides aminés","Nucléotides","Ribose et uracile","Glucose et fructose"], c:1},
  {cat:"svt", q:"Le neurone moteur transmet l'influx nerveux :", a:["Du muscle vers le cerveau","Du cerveau vers le muscle","Entre deux neurones sensitifs","Du récepteur vers la moelle"], c:1},
  {cat:"svt", q:"Quel est le rôle de l'insuline ?", a:["Augmenter la glycémie","Stimuler la sécrétion de glucagon","Faire baisser la glycémie","Stimuler la glycogénolyse"], c:2},
  {cat:"svt", q:"La paroi cellulaire des végétaux est principalement composée de :", a:["Protéines","Amidon","Cellulose","Chitine"], c:2},
  // ── MATHS ────────────────────────────────────────────────────
  {cat:"maths", q:"La dérivée de f(x) = x³ − 5x + 2 est :", a:["3x² − 5","3x² + 2","x² − 5","3x − 5"], c:0},
  {cat:"maths", q:"Si log₁₀(x) = 2, alors x est égal à :", a:["20","100","200","1000"], c:1},
  {cat:"maths", q:"La limite de (sin x)/x quand x→0 est :", a:["0","∞","1","Indéterminée"], c:2},
  {cat:"maths", q:"Le discriminant de x² − 4x + 5 vaut :", a:["−4","4","36","0"], c:0},
  {cat:"maths", q:"L'intégrale de 2x dx vaut :", a:["x","2x²","x² + C","2 + C"], c:2},
  {cat:"maths", q:"Dans un repère orthonormé, la pente d'une droite passant par A(0,1) et B(2,5) est :", a:["1","2","3","4"], c:1},
  {cat:"maths", q:"Combien de termes a la suite arithmétique de 1 à 100 avec une raison de 3 ?", a:["33","34","35","36"], c:1},
  {cat:"maths", q:"Si un triangle a des angles 30°, 60° et 90°, quel est le rapport de l'hypoténuse au côté le plus court ?", a:["√2","2","√3","3"], c:1},
  {cat:"maths", q:"La probabilité de tirer une boule rouge dans un sac de 3 rouges et 7 bleues est :", a:["0,3","0,7","0,5","0,25"], c:0},
  {cat:"maths", q:"Résoudre : 2x + 3 = 11 donne x = ?", a:["3","4","5","6"], c:1},
  {cat:"maths", q:"Le vecteur directeur de la droite y = −2x + 5 est :", a:["(1 ; 2)","(1 ; −2)","(2 ; −1)","(−2 ; 5)"], c:1},
  {cat:"maths", q:"La somme des n premiers entiers naturels est :", a:["n(n+1)","n²","n(n+1)/2","n(n-1)/2"], c:2},
  // ── PHYSIQUE-CHIMIE ─────────────────────────────────────────
  {cat:"pc", q:"La loi d'Ohm relie :", a:["Tension, résistance, puissance","Tension, intensité, résistance","Intensité, puissance, fréquence","Charge, masse, accélération"], c:1},
  {cat:"pc", q:"La vitesse de la lumière dans le vide est approximativement :", a:["3×10⁶ m/s","3×10⁸ m/s","3×10¹⁰ m/s","3×10⁴ m/s"], c:1},
  {cat:"pc", q:"Le pH d'une solution neutre à 25 °C est :", a:["0","7","14","1"], c:1},
  {cat:"pc", q:"L'unité SI de force est :", a:["Joule","Watt","Newton","Pascal"], c:2},
  {cat:"pc", q:"Lors d'une réaction exothermique, l'enthalpie ΔH est :", a:["Positive","Négative","Nulle","Variable"], c:1},
  {cat:"pc", q:"La formule de l'acide sulfurique est :", a:["HCl","H₂SO₄","H₂CO₃","HNO₃"], c:1},
  {cat:"pc", q:"Dans un circuit série, les résistances s'additionnent. Vrai ou faux ?", a:["Vrai","Faux"], c:0},
  {cat:"pc", q:"La fréquence d'une onde lumineuse visible est de l'ordre de :", a:["10³ Hz","10⁶ Hz","10¹⁵ Hz","10²² Hz"], c:2},
  {cat:"pc", q:"Le numéro atomique du carbone est :", a:["6","8","12","14"], c:0},
  {cat:"pc", q:"La réaction de saponification transforme :", a:["Un acide en sel","Une ester en acide et alcool","Une graisse en savon et glycérol","Un alcool en alcène"], c:2},
  {cat:"pc", q:"Quelle est la formule de la vitesse en mécanique newtonienne ?", a:["v = m × a","v = F / m","v = d / t","v = F × t"], c:2},
  {cat:"pc", q:"Un conducteur ohmique a une résistance de 10 Ω sous 5 V. L'intensité est :", a:["0,2 A","0,5 A","2 A","50 A"], c:1},
  // ── CULTURE GÉNÉRALE BF ─────────────────────────────────────
  {cat:"cg", q:"Quel est le nom officiel du Burkina Faso en langue nationale moore ?", a:["Burkina Faso","Burkindi Fasoko","Buuri Weogo","Faso Taaba"], c:0},
  {cat:"cg", q:"Quelle est la monnaie utilisée au Burkina Faso ?", a:["Le franc burkinabè","Le franc CFA (XOF)","Le dalasi","Le cédi"], c:1},
  {cat:"cg", q:"Quelle organisation sous-régionale regroupe les pays d'Afrique de l'Ouest ?", a:["UA","CEMAC","CEDEAO","SADC"], c:2},
  {cat:"cg", q:"Quel est le plus grand marché de Ouagadougou ?", a:["Marché de Gounghin","Marché central Rood Woko","Marché de Karpala","Marché de Pissy"], c:1},
  {cat:"cg", q:"L'indépendance de la Haute-Volta a été proclamée le :", a:["11 décembre 1958","5 août 1960","4 août 1983","15 octobre 1987"], c:1},
  {cat:"cg", q:"Qui a été le premier président du Faso après la rectification de 1987 ?", a:["Thomas Sankara","Jean-Baptiste Ouédraogo","Blaise Compaoré","Roch Marc Christian Kaboré"], c:2},
  {cat:"cg", q:"Quel est le principal fleuve qui traverse le Burkina Faso par l'ouest ?", a:["Nakambé","Sirba","Mouhoun","Comoé"], c:2},
  {cat:"cg", q:"L'Assemblée nationale burkinabè compte combien de députés (Constitution de 2015) ?", a:["90","111","127","150"], c:1},
  {cat:"cg", q:"Quel pays partage la frontière nord du Burkina Faso ?", a:["Niger","Mali","Bénin","Côte d'Ivoire"], c:1},
  {cat:"cg", q:"En quelle année a eu lieu le soulèvement populaire qui a mis fin au régime de Blaise Compaoré ?", a:["2012","2014","2016","2018"], c:1},
  {cat:"cg", q:"La langue officielle du Burkina Faso est :", a:["Le moore","Le dioula","Le français","Le fulfuldé"], c:2},
];

function shuffle(arr) {
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
}
let displayIndices = shuffle(QUESTIONS.map((_,i)=>i));
let currentIdx = 0;
let userAnswers = new Array(QUESTIONS.length).fill(null);
let submitted = false;
let timerInterval;
let timeLeft = 3600;

// TIMER
function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        const m = String(Math.floor(timeLeft/60)).padStart(2,'0');
        const s = String(timeLeft%60).padStart(2,'0');
        const el = document.getElementById('timerEl');
        el.textContent = `⏱ ${m}:${s}`;
        if(timeLeft <= 60) el.classList.add('urgent');
        if(timeLeft <= 0) { clearInterval(timerInterval); showResults(); }
    }, 1000);
}

// RENDER
function getVisibleList() { return displayIndices; }

function render() {
    const list = getVisibleList();
    if(!list.length) { document.getElementById('questionText').textContent="Aucune question dans cette catégorie."; document.getElementById('answersContainer').innerHTML=''; return; }
    const realIdx = list[currentIdx] ?? list[0];
    const q = QUESTIONS[realIdx];
    const letters = ['A','B','C','D'];

    document.getElementById('qNum').textContent = currentIdx+1;
    document.getElementById('qTot').textContent = list.length;
    const catLabel = document.getElementById('qCatLabel');
    catLabel.textContent = {svt:'🌿 SVT', maths:'📐 Maths', pc:'⚗️ Physique-Chimie', cg:'🌍 Culture'}[q.cat];
    catLabel.className = 'q-cat ' + q.cat;
    document.getElementById('questionText').textContent = q.q;

    const container = document.getElementById('answersContainer');
    container.innerHTML = '';
    const feedback = document.getElementById('feedbackBox');
    feedback.className = 'feedback';
    feedback.textContent = '';

    q.a.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        if(submitted) {
            if(i === q.c) btn.classList.add('reveal-correct');
            else if(userAnswers[realIdx] === i && i !== q.c) btn.classList.add('wrong');
        } else {
            if(userAnswers[realIdx] === i) btn.classList.add('selected');
        }
        btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${ans}</span>`;
        if(!submitted) btn.addEventListener('click', () => pickAnswer(realIdx, i));
        container.appendChild(btn);
    });

    if(submitted && userAnswers[realIdx] !== null) {
        feedback.className = 'feedback ' + (userAnswers[realIdx] === q.c ? 'correct' : 'wrong');
        feedback.textContent = userAnswers[realIdx] === q.c ? '✅ Bonne réponse !' : `❌ Mauvaise réponse. Bonne réponse : ${q.a[q.c]}`;
    }

    updateProgress();
}

function pickAnswer(realIdx, i) {
    userAnswers[realIdx] = i;
    render();
}

function updateProgress() {
    const list = getVisibleList();
    const answered = list.filter(i => userAnswers[i] !== null).length;
    const pct = list.length ? Math.max(2, Math.round(answered/list.length*100)) : 2;
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('answeredCount').textContent = answered;
    document.getElementById('remainingCount').textContent = list.length - answered;
}

function showResults() {
    clearInterval(timerInterval);
    submitted = true;
    document.getElementById('quizCard').style.display = 'none';
    document.getElementById('resultScreen').classList.add('show');

    const total = QUESTIONS.length;
    let score = 0;
    QUESTIONS.forEach((q,i) => { if(userAnswers[i] === q.c) score++; });

    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreDenom').textContent = '/ '+total;

    const pct = Math.round(score/total*100);
    let msg = pct>=80 ? '🏅 Excellent ! Tu es prêt(e) pour le concours !'
            : pct>=60 ? '👍 Très bien ! Continue à réviser.'
            : pct>=40 ? '📚 Bonne base. Revois les notions essentielles.'
            : '💪 Courage ! Chaque révision te rapproche du succès.';
    document.getElementById('resultMsg').textContent = msg;

    // Stats par matière
    const cats = ['svt','maths','pc','cg'];
    const catNames = {svt:'SVT',maths:'Maths',pc:'Physique-Chimie',cg:'Culture'};
    const catColors = {svt:'#e6f4ec;color:#1a6b3a',maths:'#e3f0fd;color:#1565c0',pc:'#f3e5f9;color:#6a1b9a',cg:'#fff3e0;color:#b35000'};
    const statsRow = document.getElementById('statsRow');
    statsRow.innerHTML = '';
    cats.forEach(cat => {
        const qs = QUESTIONS.filter(q=>q.cat===cat);
        const correct = qs.filter((q,_)=>userAnswers[QUESTIONS.indexOf(q)]===q.c).length;
        const pill = document.createElement('span');
        pill.className='stat-pill';
        pill.style.cssText = `background:${catColors[cat].split(';')[0].replace('background:','')};${catColors[cat].split(';')[1]}`;
        pill.textContent = `${catNames[cat]} : ${correct}/${qs.length}`;
        statsRow.appendChild(pill);
    });
}

// CORRIGÉ
document.getElementById('toggleCorrigeBtn').addEventListener('click', () => {
    const d = document.getElementById('corrigeDiv');
    const btn = document.getElementById('toggleCorrigeBtn');
    if(d.style.display==='none') {
        d.style.display='block'; btn.textContent='🙈 Masquer le corrigé';
        let html = '<h4 style="margin-bottom:.8rem;font-family:Syne,sans-serif">📖 Corrigé complet</h4>';
        QUESTIONS.forEach((q,i) => {
            const ua = userAnswers[i];
            const ok = ua === q.c;
            html += `<div class="corrige-item">
                <div class="qtext">${i+1}. ${q.q}</div>
                <div class="ans-line">📌 Bonne réponse : <strong>${q.a[q.c]}</strong></div>
                <div class="ans-line ${ok?'ok':'ko'}">${ok?'✅':'❌'} Votre réponse : ${ua!==null?q.a[ua]:'Non répondue'}</div>
            </div>`;
        });
        d.innerHTML = html;
    } else { d.style.display='none'; btn.textContent='📖 Afficher le corrigé'; }
});

// RESTART
document.getElementById('restartBtn').addEventListener('click', () => {
    userAnswers = new Array(QUESTIONS.length).fill(null);
    displayIndices = shuffle(QUESTIONS.map((_,i)=>i));
    currentIdx = 0; submitted = false; timeLeft = 3600;
    clearInterval(timerInterval);
    document.getElementById('timerEl').textContent='⏱ 60:00';
    document.getElementById('timerEl').classList.remove('urgent');
    document.getElementById('resultScreen').classList.remove('show');
    document.getElementById('corrigeDiv').style.display='none';
    document.getElementById('toggleCorrigeBtn').textContent='📖 Afficher le corrigé';
    document.getElementById('quizCard').style.display='block';
    startTimer(); render();
});

// NAVIGATION
document.getElementById('prevBtn').addEventListener('click', () => {
    if(currentIdx>0){currentIdx--;render();}
});
document.getElementById('nextBtn').addEventListener('click', () => {
    const list=getVisibleList();
    if(currentIdx<list.length-1){currentIdx++;render();}
});
document.getElementById('submitBtn').addEventListener('click', () => {
    const list=getVisibleList();
    const answered=list.filter(i=>userAnswers[i]!==null).length;
    if(answered<list.length){
        if(!confirm(`Tu n'as répondu qu'à ${answered}/${list.length} questions. Soumettre quand même ?`)) return;
    }
    showResults();
});

startTimer();
render();
</script>
</body>
</html>
